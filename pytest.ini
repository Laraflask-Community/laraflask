[pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test* *Test
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --no-header
    --color=yes
    --durations=10
    --strict-markers

# Coverage
# addopts = --cov=laraflask --cov-report=term-missing --cov-report=html

markers =
    unit: Unit tests — isolated, no I/O
    feature: Feature tests — HTTP, DB, full stack
    slow: Slow tests (skipped with -m "not slow")
    db: Tests requiring a database connection

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Timeout (requires pytest-timeout)
# timeout = 30
